    <h1>HTML Multimedia - Audio & Video </h1>

    <h2>1. Simple Audio</h2>
    <audio src="/Materials/sonican-uplifting-feelgood-30-seconds-corporate-430728 (1).mp3" controls></audio>
    <br><br>

    <h2>2. Autoplay Audio</h2>
    <audio src="/Materials/sonican-uplifting-feelgood-30-seconds-corporate-430728 (1).mp3" controls autoplay muted></audio>
    <br><br>

    <h2>3. Loop Audio</h2>
    <audio src="/Materials/sonican-uplifting-feelgood-30-seconds-corporate-430728 (1).mp3" loop controls>
    </audio>
    <br><br>

    <h2>4. Simple Video</h2>
    <video src="/Materials/vidssave.com What_ Meme 720p (1).mp4" controls height="400" width="400">
    </video>
    

    <h2>5. Autoplay Video</h2>
    <video src="/Materials/vidssave.com What_ Meme 720p (1).mp4" controls autoplay muted height="400" width="400"></video>


    <h2>6. Loop Video</h2>
    <video src="/Materials/vidssave.com What_ Meme 720p (1).mp4" controls loop height="400" width="400"></video>
    

    <h2>7. Video with Poster</h2>
    <video src="/Materials/vidssave.com What_ Meme 720p (1).mp4" poster="https://cdn.pixabay.com/photo/2016/09/07/11/37/sunset-1651426_1280.jpg" controls height="400" width="400"></video>
    <!-- poster attribute is just like "thumbnail" in YouTube Video. -->


    <h2>8. Embedded Video</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/ok5xxc9LhPg?si=f6L3QhICAsbzigkJ" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen height="400" width="400"></iframe>

    <!-- We can use iframe to embed external YT Videos, Google Maps etc etc. -->
